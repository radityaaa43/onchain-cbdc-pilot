apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firefly-evmconnect
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://github.com/hyperledger/firefly-helm-charts.git
    targetRevision: main
    path: charts/firefly-evmconnect
    helm:
      values: |
        image:
          repository: ghcr.io/hyperledger/firefly-evmconnect
          pullPolicy: IfNotPresent
          tag: "v1.4.0"
        service:
          type: ClusterIP
          port: 5000
        config:
          # Signer acts as eth endpoint (signing) and forwards to besu-node1
          jsonRpcUrl: "http://firefly-signer.firefly.svc:8545"
          log:
            level: debug
            jsonEnabled: false
          confirmations:
            required: 0
          persistence:
            type: leveldb
            leveldb:
              maxHandles: 100
              syncWrites: false
          connector: |
            url: "http://firefly-signer.firefly.svc:8545"
        persistentVolume:
          size: 2Gi
          accessModes:
            - ReadWriteOnce
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        podSecurityContext:
          fsGroup: 1001
        nodeSelector:
          kubernetes.io/arch: amd64
        initContainers: |
          - name: wait-signer
            image: busybox:1.36.1
            command: ['sh', '-c', 'until nc -z firefly-signer.firefly.svc 8545; do echo waiting for signer; sleep 3; done']
  destination:
    server: https://kubernetes.default.svc
    namespace: firefly
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
