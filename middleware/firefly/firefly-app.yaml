apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firefly
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://github.com/hyperledger/firefly-helm-charts.git
    targetRevision: main
    path: charts/firefly
    helm:
      values: |
        config:
          debugEnabled: false
          adminEnabled: true
          metricsEnabled: true
          preInit: false
          multipartyEnabled: true
          defaultBlockchainType: ethereum

          organizationName: "cbdc-pilot"
          organizationKey: ""

          # fireflyContractAddress populated by scripts/setup-firefly.sh after bootstrap
          # or auto-deployed by FireFly on first start (zeroBaseFee chain = free gas)
          fireflyContractAddress: ""
          fireflyContractFirstEvent: 0
          fireflyContracts: []

          evmconnectUrl: "http://firefly-evmconnect.firefly.svc:5000"
          evmconnectRetry: true
          evmconnectTopic: "0"

          postgresUrl: "postgres://postgres:LilJirp9aUzPl5Bg2oW7@postgres-postgresql.database.svc:5432/firefly?sslmode=disable"
          postgresAutomigrate: true

          ipfsApiUrl: "http://ipfs.firefly.svc:5001"
          ipfsGatewayUrl: "http://ipfs.firefly.svc:8080"

          httpRequestTimeout: 600s

        core:
          nodeNameOverride: "cbdc-node1"
          image:
            repository: ghcr.io/hyperledger/firefly
            tag: "latest"
            pullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 8
          readinessProbe:
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 8
          initContainers: |
            - name: wait-evmconnect
              image: busybox:1.36.1
              command: ['sh', '-c', 'until nc -z firefly-evmconnect.firefly.svc 5000; do echo waiting for evmconnect; sleep 5; done']
            - name: wait-ipfs
              image: busybox:1.36.1
              command: ['sh', '-c', 'until nc -z ipfs.firefly.svc 5001; do echo waiting for ipfs; sleep 5; done']
            - name: create-db
              image: postgres:15-alpine
              command: ['sh', '-c']
              args:
                - |
                  PSQL_SERVER="postgres://postgres:LilJirp9aUzPl5Bg2oW7@postgres-postgresql.database.svc:5432/postgres?sslmode=disable"
                  until psql "${PSQL_SERVER}" -c "SELECT 1;" > /dev/null 2>&1; do
                    echo "waiting for postgres..."; sleep 3
                  done
                  psql "${PSQL_SERVER}" -tc "SELECT 1 FROM pg_database WHERE datname='firefly'" | grep -q 1 || \
                    psql "${PSQL_SERVER}" -c "CREATE DATABASE firefly WITH OWNER postgres;"
                  echo "firefly DB ready"
          jobs:
            postgresMigrations:
              enabled: false
            registration:
              enabled: true
              ffUrl: "http://firefly:5000"

        dataexchange:
          enabled: true
          image:
            repository: ghcr.io/hyperledger/firefly-dataexchange-https
            tag: "latest"
            pullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

        nodeSelector:
          kubernetes.io/arch: amd64
  destination:
    server: https://kubernetes.default.svc
    namespace: firefly
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /status/terminatingReplicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
