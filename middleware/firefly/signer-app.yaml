apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: firefly-signer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/hyperledger/firefly-helm-charts.git
    targetRevision: main
    path: charts/firefly-signer
    helm:
      values: |
        image:
          repository: ghcr.io/hyperledger/firefly-signer
          pullPolicy: IfNotPresent
          tag: "v1.1.22"
        backend:
          url: "http://besu-node1.paladin.svc:8545"
          chainId: 1337
        signer:
          enabled: true
        service:
          type: ClusterIP
          port: 8545
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        podSecurityContext:
          fsGroup: 1001
        nodeSelector:
          kubernetes.io/arch: amd64
  destination:
    server: https://kubernetes.default.svc
    namespace: firefly
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
