apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scylla
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://storage.googleapis.com/scylla-operator-charts/stable
    chart: scylla
    targetRevision: v1.21.0
    helm:
      values: |
        developerMode: true
        scyllaArgs: "--smp 1 --memory 800M"
        scylla:
          datacenter: dc1
        racks:
          - name: us-east-1a
            members: 1
            storage:
              storageClassName: local-path
              capacity: 10Gi
            resources:
              limits:
                cpu: "2"
                memory: 2Gi
              requests:
                cpu: "500m"
                memory: 2Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: scylla
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
