---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: cbdc-tx-confirmed
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka
spec:
  partitions: 3
  replicas: 1
  topicName: cbdc.tx.confirmed
  config:
    retention.ms: "604800000"   # 7 days
    cleanup.policy: delete
