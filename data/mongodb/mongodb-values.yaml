architecture: standalone

auth:
  enabled: true
  rootUser: root
  rootPassword: ""   # set via --set or secret
  database: admin

primary:
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""

service:
  type: ClusterIP
  port: 27017

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
