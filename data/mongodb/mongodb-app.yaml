apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mongodb
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mongodb
    targetRevision: "19.1.4"
    helm:
      valueFiles: []
      values: |
        architecture: standalone
        auth:
          enabled: true
          rootUser: root
          rootPassword: "cbdcMongo2024!"
          database: admin
        primary:
          persistence:
            enabled: true
            size: 8Gi
        service:
          type: ClusterIP
          port: 27017
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: database
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
