---
# Besu node2 — joins QBFT via static-nodes (operator auto-populates)
apiVersion: core.paladin.io/v1alpha1
kind: Besu
metadata:
  name: node2
  namespace: paladin
  labels:
    app.kubernetes.io/instance: paladin-operator
    app.kubernetes.io/name: node2
spec:
  genesis: testnet
  service:
    ports:
    - name: rpc-http
      nodePort: 31645
      port: 8545
      protocol: TCP
    - name: rpc-ws
      nodePort: 31646
      port: 8546
      protocol: TCP
    - name: graphql-http
      nodePort: 31647
      port: 8547
      protocol: TCP
    type: NodePort
---
