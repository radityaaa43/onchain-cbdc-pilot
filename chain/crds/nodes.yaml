---
# Paladin node2 — Noto+Pente domains (no Zeto — SIGILL on non-AVX2)
apiVersion: core.paladin.io/v1alpha1
kind: Paladin
metadata:
  name: node2
  namespace: paladin
  labels:
    app.kubernetes.io/instance: paladin-operator
    app.kubernetes.io/name: node2
spec:
  baseLedgerEndpoint:
    local:
      nodeName: node2
    type: local
  config: |
    log:
      level: debug
    publicTxManager:
      gasLimit:
        gasEstimateFactor: 2.0
  database:
    migrationMode: auto
    mode: sidecarPostgres
  domains:
  - labelSelector:
      matchLabels:
        paladin.io/domain-name: noto
  - labelSelector:
      matchLabels:
        paladin.io/domain-name: pente
  registries:
  - labelSelector:
      matchLabels:
        paladin.io/registry-name: evm-registry
  secretBackedSigners:
  - derivationType: bip32
    keySelector: .*
    keySelectorMustNotMatch: false
    name: signer-1
    secret: node2.keys
    type: autoHDWallet
  service:
    ports:
    - name: rpc-http
      nodePort: 31648
      port: 8548
      protocol: TCP
    - name: rpc-ws
      nodePort: 31649
      port: 8549
      protocol: TCP
    type: NodePort
  transports:
  - configJSON: |
      {
        "port": 9000,
        "address": "0.0.0.0"
      }
    name: grpc
    plugin:
      library: /app/transports/libgrpc.so
      type: c-shared
    ports:
    - name: transport-grpc
      port: 9000
      protocol: TCP
      targetPort: 9000
    tls:
      certName: paladin-node2-mtls
      issuer: selfsigned-issuer
      secretName: paladin-node2-mtls
