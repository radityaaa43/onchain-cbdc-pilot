---
# onchain-cbdc-pilot config.yaml
# THE ONLY FILE YOU EDIT PER ORG.
# After editing: bash scripts/render.sh --write
#                git add -A && git commit -m "configure org"
#                bash bootstrap.sh

org:
  name: cbdc-pilot
  domain: cbdc.cluster.local
  email: admin@cbdc.example

repo:
  url: https://github.com/radityaaa43/onchain-cbdc-pilot
  revision: HEAD

arch: amd64

besu:
  chainId: 1337
  blockPeriodSeconds: 2
  zeroBaseFee: true
  evmFork: cancun
  imageTag: latest
  nodeCount: 4
  baseNodePort: 31545

paladin:
  imageTag: latest
  baseNodePort: 31548
  domains:
    noto: true
    zeto: false        # disabled — no AVX2
    pente: true

minio:
  rootUser: minioadmin
  buckets:
    - cbdc-kyc
    - cbdc-settlement
    - cbdc-audit

kafka:
  topics:
    - cbdc.tx.confirmed
    - cbdc.mint
    - cbdc.transfer
    - cbdc.audit

crossOrg:
  mode: standalone
  peers: []
